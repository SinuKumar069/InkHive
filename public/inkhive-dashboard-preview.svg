    <text x="495" y="586" fill="#EFEFF1" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600"># The Future of Remote Work in 2024</text>
    <text x="495" y="663" fill="#E7E7EA" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500">The traditional office grind is rapidly becoming a relic of the past. Remote work is no longer</text>
    <text x="495" y="704" fill="#E7E7EA" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500">a temporary perk or niche alternative; it has matured into a central pillar of modern work.</text>
